name: eriksperfmon

configs:
  krb5_conf:
    content: |
      # kerberos client config for the AD profile realm ${AD_REALM}.
      # mounted into ansible-runner, grafana, and mssql-ad; kdc resolves via the compose
      # network alias on the samba-ad service. rdns=false because docker PTR records would
      # otherwise break SPN construction. Generated from AD_DOMAIN/AD_REALM in .env - do not
      # hand-edit this file.
      [libdefaults]
          default_realm = ${AD_REALM}
          dns_lookup_realm = false
          dns_lookup_kdc = false
          rdns = false

      [realms]
          ${AD_REALM} = {
              kdc = sambadc.${AD_DOMAIN}
              admin_server = sambadc.${AD_DOMAIN}
              default_domain = ${AD_DOMAIN}
          }

      [domain_realm]
          .${AD_DOMAIN} = ${AD_REALM}
          ${AD_DOMAIN} = ${AD_REALM}

x-mssql-env: &mssql-env
  ACCEPT_EULA: "Y"
  MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
  MSSQL_PID: Developer
  MSSQL_AGENT_ENABLED: "true"
  TZ: America/New_York
  MSSQL_MEMORY_LIMIT_MB: "1536"

x-mssql-deploy: &mssql-deploy
  deploy:
    resources:
      limits:
        memory: 2g

x-healthcheck-modern: &healthcheck-modern
  test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -b -Q 'SELECT 1' -o /dev/null"]
  interval: 10s
  timeout: 10s
  retries: 30
  start_period: 30s

services:
  mssql-2022:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: perfmon-mssql-2022
    <<: *mssql-deploy
    cpuset: "0,1"
    environment:
      <<: *mssql-env
    healthcheck:
      <<: *healthcheck-modern
    ports:
      - "14333:1433"
    volumes:
      - mssql-2022-data:/var/opt/mssql

  mssql-2025:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: perfmon-mssql-2025
    <<: *mssql-deploy
    environment:
      <<: *mssql-env
    healthcheck:
      <<: *healthcheck-modern
    ports:
      - "14334:1433"
    volumes:
      - mssql-2025-data:/var/opt/mssql

  ansible-runner:
    build:
      context: .
      dockerfile: docker/ansible-runner/Dockerfile
    container_name: perfmon-ansible-runner
    depends_on:
      mssql-2022:
        condition: service_healthy
      mssql-2025:
        condition: service_healthy
      grafana:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_READER_PASSWORD: ${MSSQL_READER_PASSWORD}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GRAFANA_URL: http://grafana:3000
      GRAFANA_ADMIN_USER: admin
      AD_SQLADMIN_PASSWORD: ${AD_SQLADMIN_PASSWORD}
      AD_READER_PASSWORD: ${AD_READER_PASSWORD}
      AD_DOMAIN: ${AD_DOMAIN}
      AD_REALM: ${AD_REALM}
      AD_NETBIOS: ${AD_NETBIOS}
    volumes:
      - ./.env:/workspace/.env
      - ./ansible:/workspace/ansible
      - ./bootstrap:/workspace/bootstrap:ro
      - ./community:/workspace/community:ro
      - ./patches:/workspace/patches:ro
      - ./scripts:/workspace/scripts:ro
    configs:
      - source: krb5_conf
        target: /etc/krb5.conf
    restart: "no"

  # demo workload against mssql-2022
  workload:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: perfmon-workload
    depends_on:
      mssql-2022:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      TARGET_HOST: mssql-2022
    entrypoint: ["/bin/bash", "/scripts/workload.sh"]
    volumes:
      - ./scripts/workload.sh:/scripts/workload.sh:ro
    restart: unless-stopped

  # memory-pressure workload against mssql-2025
  workload-memory:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: perfmon-workload-memory
    depends_on:
      mssql-2025:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      TARGET_HOST: mssql-2025
    entrypoint: ["/bin/bash", "/scripts/workload-memory.sh"]
    volumes:
      - ./scripts/workload-memory.sh:/scripts/workload-memory.sh:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.9
    container_name: perfmon-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: krb5_conf
        target: /etc/krb5.conf
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Opt-in, for AD-auth ansible tests: `docker compose --profile ad up -d` adds a Samba AD DC
  # and an AD-authenticated SQL Server instance. SQL Server's Kerberos auth - CREATE LOGIN
  # FROM WINDOWS and kerberos client logins interoperates with this Samba AD DC, provided the
  # DNS prerequisites exist (NetBIOS-name A record, reverse zone with DC PTR - created by
  # docker/samba-ad/provision-ad.sh) and the SQL container has an FQDN hostname with resolv.conf
  # pointed directly at the DC (docker/mssql-ad/entrypoint.sh).
  samba-ad:
    build:
      context: .
      dockerfile: docker/samba-ad/Dockerfile
    container_name: perfmon-samba-ad
    hostname: sambadc
    environment:
      DOMAIN: ${AD_REALM}
      DOMAINPASS: ${SAMBA_ADMIN_PASSWORD}
      NOCOMPLEXITY: "true"
      # forwards anything outside AD_DOMAIN to Docker's embedded resolver, so clients can
      # point solely at this container's DNS and still resolve other compose service names.
      DNSFORWARDER: "127.0.0.11"
      MSSQL_AD_IP: 10.200.1.246
      AD_DOMAIN: ${AD_DOMAIN}
      AD_NETBIOS: ${AD_NETBIOS}
      AD_SQLADMIN_PASSWORD: ${AD_SQLADMIN_PASSWORD}
      AD_READER_PASSWORD: ${AD_READER_PASSWORD}
      AD_SVC_MSSQL_PASSWORD: ${AD_SVC_MSSQL_PASSWORD}
    privileged: true
    networks:
      default:
        ipv4_address: 10.200.1.245
        aliases:
          - sambadc.${AD_DOMAIN}
    volumes:
      - samba-ad-data:/var/lib/samba
      - ad-keytab:/ad-keytab
    profiles: ["ad"]

  # AD-authenticated instance. The ansible-runner detects it via its
  # network alias and installs PerformanceMonitor over kerberos.
  mssql-ad:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: perfmon-mssql-ad
    hostname: mssql-ad.${AD_DOMAIN}
    user: root
    <<: *mssql-deploy
    entrypoint: ["/bin/bash", "/scripts/entrypoint.sh"]
    environment:
      <<: *mssql-env
      AD_DOMAIN: ${AD_DOMAIN}
      AD_NETBIOS: ${AD_NETBIOS}
    networks:
      default:
        ipv4_address: 10.200.1.246
        aliases:
          - mssql-ad.${AD_DOMAIN}
    depends_on:
      samba-ad:
        condition: service_started
    ports:
      - "14335:1433"
    volumes:
      - mssql-ad-data:/var/opt/mssql
      - ad-keytab:/ad-keytab:ro
      - ./docker/mssql-ad/entrypoint.sh:/scripts/entrypoint.sh:ro
    configs:
      - source: krb5_conf
        target: /etc/krb5.conf
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -b -Q \"IF IS_SRVROLEMEMBER(N'sysadmin', N'${AD_NETBIOS}\\\\sqladmin') <> 1 RAISERROR(N'AD bootstrap pending', 16, 1);\" -o /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 60s
    profiles: ["ad"]

networks:
  default:
    ipam:
      config:
        - subnet: 10.200.1.0/24

volumes:
  mssql-2022-data:
  mssql-2025-data:
  mssql-ad-data:
  grafana-data:
  samba-ad-data:
  ad-keytab:
