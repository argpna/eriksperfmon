name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install tooling
        run: pip install -r requirements.txt
      - name: black
        run: black --check .
      - name: pylint
        run: git ls-files '*.py' | xargs pylint
      - name: ansible-lint
        run: ansible-lint
      - name: Time-macro static check
        run: python3 scripts/check-time-macros.py
      - name: Committed dashboard JSON matches generated output
        run: |
          python3 ansible/roles/perfmon_grafana/files/build-dashboards.py
          drift=$(git status --porcelain -- ansible/roles/perfmon_grafana/files/grafana/dashboards)
          if [ -n "$drift" ]; then
            echo "$drift"
            git diff -- ansible/roles/perfmon_grafana/files/grafana/dashboards | head -80
            echo "::error::committed dashboard JSON is stale - run build-dashboards.py and commit the result"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: static
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d
      - name: Wait for playbook run
        run: |
          rc=$(docker wait perfmon-ansible-runner)
          docker logs perfmon-ansible-runner 2>&1 | tail -40
          exit "$rc"
      - name: Assert datasources, auth, alert rules
        run: python3 scripts/e2e-checks.py perfmon-ds-sql2022:sql perfmon-ds-sql2025:sql
      - name: Smoke-test every panel query
        run: |
          GRAFANA_API_KEY=$(grep '^GRAFANA_API_KEY=' .env | cut -d= -f2-)
          export GRAFANA_API_KEY
          python3 scripts/verify-panels.py perfmon-ds-sql2022 perfmon-ds-sql2025
      # scripts are idempotent: a second full playbook run must succeed
      - name: Playbook re-run succeeds
        run: docker compose run --rm ansible-runner
      - name: Diagnostics
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --tail 100 ansible-runner grafana mssql-2022 mssql-2025

  e2e-ad:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: static
    steps:
      - uses: actions/checkout@v4
      - name: Start stack with AD profile
        run: |
          cp .env.example .env
          docker compose --profile ad up -d
      - name: Wait for playbook run
        run: |
          rc=$(docker wait perfmon-ansible-runner)
          docker logs perfmon-ansible-runner 2>&1 | tail -40
          exit "$rc"
      - name: Assert datasources, auth, alert rules
        run: >-
          python3 scripts/e2e-checks.py
          perfmon-ds-sql2022:sql perfmon-ds-sql2025:sql perfmon-ds-sqlad:windows
      - name: Smoke-test every panel query
        run: |
          GRAFANA_API_KEY=$(grep '^GRAFANA_API_KEY=' .env | cut -d= -f2-)
          export GRAFANA_API_KEY
          python3 scripts/verify-panels.py perfmon-ds-sql2022 perfmon-ds-sql2025 perfmon-ds-sqlad
      - name: Playbook re-run succeeds
        run: docker compose --profile ad run --rm ansible-runner
      - name: Diagnostics
        if: failure()
        run: |
          docker compose --profile ad ps -a
          docker compose --profile ad logs --tail 100 ansible-runner grafana samba-ad mssql-ad
