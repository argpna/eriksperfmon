---
# End-to-end install PerformanceMonitor on all database instances,
# then provision grafana dashboards, alerting.
#
# Usage:
#   ansible-playbook -i ansible/inventory ansible/playbooks/main.yml

- name: Install PerformanceMonitor on SQL Server instances
  import_playbook: install_performance_monitor.yml

- name: Deploy PerformanceMonitor dashboards to Grafana
  import_playbook: deploy_perfmon_grafana.yml
