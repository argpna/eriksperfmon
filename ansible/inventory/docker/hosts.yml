---
# docker-internal inventory for the ansible-runner container
all:
  children:
    sql_servers:
      hosts:
        sql2022:
          ansible_host: mssql-2022
          ansible_connection: local
          mssql_port: 1433
          ds_host: mssql-2022
          ds_port: 1433
        sql2025:
          ansible_host: mssql-2025
          ansible_connection: local
          mssql_port: 1433
          ds_host: mssql-2025
          ds_port: 1433
        # AD-authenticated instance - compose profile ad. the runner entrypoint
        # skips this host with --limit '!sqlad' when the profile isn't running.
        sqlad:
          ansible_host: "mssql-ad.{{ lookup('env', 'AD_DOMAIN') }}"
          ansible_connection: local
          mssql_port: 1433
          ds_host: "mssql-ad.{{ lookup('env', 'AD_DOMAIN') }}"
          ds_port: 1433
          # uses win-auth to deploy PerformanceMonitor scripts on the target instance
          perfmon_admin_auth_mode: windows
          perfmon_admin_windows_upn: "sqladmin@{{ lookup('env', 'AD_REALM') }}"
          perfmon_admin_windows_password: "{{ lookup('env', 'AD_SQLADMIN_PASSWORD') }}"
          # reader auth mode covers both roles: perfmon_install creates the AD login
          # and perfmon_grafana authenticates the datasource (UPN)
          perfmon_reader_auth_mode: windows
          perfmon_reader_windows_principal: "{{ lookup('env', 'AD_NETBIOS') }}\\svc_grafana_reader"
          perfmon_reader_windows_upn: "svc_grafana_reader@{{ lookup('env', 'AD_REALM') }}"
          perfmon_reader_windows_password: "{{ lookup('env', 'AD_READER_PASSWORD') }}"

    grafana:
      hosts:
        grafana:
          ansible_host: localhost
          ansible_connection: local
          grafana_url: http://grafana:3000
