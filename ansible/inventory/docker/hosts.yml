---
# docker-internal inventory for the ansible-runner container
all:
  children:
    sql_servers:
      hosts:
        sql2022:
          ansible_host: mssql-2022
          ansible_connection: local
          mssql_port: 1433
          ds_host: mssql-2022
          ds_port: 1433
        sql2025:
          ansible_host: mssql-2025
          ansible_connection: local
          mssql_port: 1433
          ds_host: mssql-2025
          ds_port: 1433

    grafana:
      hosts:
        grafana:
          ansible_host: localhost
          ansible_connection: local
          grafana_url: http://grafana:3000
