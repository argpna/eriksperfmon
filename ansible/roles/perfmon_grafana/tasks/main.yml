---
- name: Validate required credentials are set
  ansible.builtin.assert:
    that:
      - grafana_api_key | default('') | length > 0
    fail_msg: "grafana_api_key must be set to a non-empty value. See README.md."
    quiet: true
  no_log: true
  tags:
    - datasources
    - dashboards
    - alerting

- name: Validate reader credentials for the resolved auth mode on every instance
  ansible.builtin.assert:
    that:
      - (item.perfmon_reader_auth_mode | default(perfmon_reader_auth_mode)) in ['sql', 'windows']
      - (item.perfmon_reader_auth_mode | default(perfmon_reader_auth_mode)) != 'windows'
        or (item.perfmon_reader_windows_upn | default(perfmon_reader_windows_upn | default(''))) | length > 0
      - (item.perfmon_reader_auth_mode | default(perfmon_reader_auth_mode)) != 'windows'
        or (item.perfmon_reader_windows_password | default(perfmon_reader_windows_password | default(''))) | length > 0
      - (item.perfmon_reader_auth_mode | default(perfmon_reader_auth_mode)) != 'sql'
        or perfmon_reader_password | default('') | length > 0
    fail_msg: >-
      Missing reader credentials for instance {{ item.inventory_hostname }} (resolved auth mode:
      {{ item.perfmon_reader_auth_mode | default(perfmon_reader_auth_mode) }}):
        - sql mode needs perfmon_reader_password.
        - windows mode needs perfmon_reader_windows_upn and perfmon_reader_windows_password
          (fleet-wide or per-host).
      See README.md 'Required credentials'.
    quiet: true
  loop: "{{ perfmon_instances }}"
  loop_control:
    label: "{{ item.inventory_hostname }}"
  no_log: true
  tags: datasources

- name: Provision datasources
  ansible.builtin.import_tasks: datasources.yml
  tags: datasources

- name: Generate dashboard JSON files
  ansible.builtin.import_tasks: generate_dashboards.yml
  tags:
    - dashboards
    - generate

- name: Import dashboards into Grafana
  ansible.builtin.import_tasks: dashboards.yml
  tags: dashboards

- name: Provision alerting resources
  ansible.builtin.import_tasks: alerting.yml
  tags: alerting

- name: Remove all provisioned resources
  ansible.builtin.import_tasks: teardown.yml
  tags:
    - teardown
    - never
