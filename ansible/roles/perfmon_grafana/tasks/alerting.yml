---
# Uses ansible.builtin.uri throughout. The grafana.grafana.alert_contact_point module is not
# idempotent on Grafana 12: it always POSTs and retries on HTTP 500 for duplicates, but Grafana 12
# returns 409 Conflict instead. The module does not handle 409 and errors on the second run.
# Workaround: GET existing UIDs, then PUT for known UIDs and POST for new ones.

- name: Set present contact points
  ansible.builtin.set_fact:
    _present_cps: >-
      {{ (perfmon_alert_contact_points | rejectattr('state', 'defined') | list)
         + (perfmon_alert_contact_points | selectattr('state', 'defined') | rejectattr('state', 'equalto', 'absent') | list) }}

- name: Get current contact points
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/v1/provisioning/contact-points"
    method: GET
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    status_code: [200]
  register: _current_cps
  delegate_to: localhost
  no_log: true

- name: Update contact points
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/v1/provisioning/contact-points/{{ item.uid }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    body_format: json
    body: "{{ item }}"
    status_code: [200, 202]
  loop: "{{ _present_cps | selectattr('uid', 'in', _current_cps.json | map(attribute='uid') | list) | list }}"
  loop_control:
    label: "{{ item.uid }}"
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: Create contact points
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/v1/provisioning/contact-points"
    method: POST
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    body_format: json
    body: "{{ item }}"
    status_code: [200, 201, 202]
  loop: "{{ _present_cps | rejectattr('uid', 'in', _current_cps.json | map(attribute='uid') | list) | list }}"
  loop_control:
    label: "{{ item.uid }}"
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: Delete absent contact points
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/v1/provisioning/contact-points/{{ item.uid }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    status_code: [200, 202, 204, 404]
  loop: "{{ perfmon_alert_contact_points | selectattr('state', 'defined') | selectattr('state', 'equalto', 'absent') | list }}"
  loop_control:
    label: "{{ item.uid }}"
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: Assert mute timing names use perfmon- prefix
  ansible.builtin.assert:
    that: item.name is match('^perfmon-')
    fail_msg: "Mute timing '{{ item.name }}' must use a 'perfmon-' prefix to be managed by this role"
    quiet: true
  loop: "{{ perfmon_alert_mute_timings }}"
  loop_control:
    label: "{{ item.name }}"

- name: Get all mute timings
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/v1/provisioning/mute-timings"
    method: GET
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    status_code: [200]
  register: _all_mute_timings
  delegate_to: localhost
  no_log: true

- name: Remove orphaned mute timings
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/v1/provisioning/mute-timings/{{ item | urlencode }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    status_code: [200, 204, 404]
  loop: >-
    {{ (_all_mute_timings.json | selectattr('name', 'match', '^perfmon-') | map(attribute='name') | list)
       | difference(perfmon_alert_mute_timings | map(attribute='name') | list) }}
  loop_control:
    label: "{{ item }}"
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: Update mute timings
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/v1/provisioning/mute-timings/{{ item.name | urlencode }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    body_format: json
    body: "{{ item }}"
    status_code: [200, 202]
  loop: "{{ perfmon_alert_mute_timings | selectattr('name', 'in', _all_mute_timings.json | map(attribute='name') | list) | list }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: Create mute timings
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/v1/provisioning/mute-timings"
    method: POST
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    body_format: json
    body: "{{ item }}"
    status_code: [200, 201, 202]
  loop: "{{ perfmon_alert_mute_timings | rejectattr('name', 'in', _all_mute_timings.json | map(attribute='name') | list) | list }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: Initialize rule group accumulator
  ansible.builtin.set_fact:
    _perfmon_rule_groups: []

- name: Collect alert rule groups per instance
  ansible.builtin.set_fact:
    _perfmon_rule_groups: >-
      {{ _perfmon_rule_groups +
         (lookup('template', role_path + '/templates/alerting/rules-instance.yaml.j2') | from_yaml).groups
         | map('combine', {'_instance': item.inventory_hostname}) | list }}
  loop: "{{ perfmon_instances }}"
  loop_control:
    label: "{{ item.inventory_hostname }}"
  delegate_to: localhost

- name: Merge alert rule groups across instances
  ansible.builtin.set_fact:
    _perfmon_merged_groups: "{{ _perfmon_rule_groups | groupby('name') | map('list') | list }}"

- name: Validate rule group interval format
  ansible.builtin.assert:
    that: item[1][0].interval is match('^[0-9]+(s|m|h|d)$')
    fail_msg: >-
      Rule group '{{ item[0] }}' has interval '{{ item[1][0].interval }}', which does not match
      the supported <number><unit> format, unit must be one of - s, m, h, d.
    quiet: true
  loop: "{{ _perfmon_merged_groups }}"
  loop_control:
    label: "{{ item[0] }}"

- name: Provision alert rule groups
  ansible.builtin.uri:
    url: >-
      {{ grafana_url }}/api/v1/provisioning/folder/{{ grafana_folder_uid
      }}/rule-groups/{{ item[0] | urlencode }}
    method: PUT
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    body_format: json
    body: >-
      {{ {
        'title': item[0],
        'interval': (item[1][0].interval | regex_search('^([0-9]+)(s|m|h|d)$', '\1') | first | int)
          * {'s': 1, 'm': 60, 'h': 3600, 'd': 86400}[item[1][0].interval | regex_search('^([0-9]+)(s|m|h|d)$', '\2') | first],
        'rules': item[1] | map(attribute='rules') | sum(start=[])
      } }}
    status_code: [200, 202]
  loop: "{{ _perfmon_merged_groups }}"
  loop_control:
    label: "{{ item[0] }}"
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: Upsert perfmon route in Grafana notification policy
  ansible.builtin.command:
    argv:
      - python3
      - "{{ role_path }}/files/upsert_notification_route.py"
      - --grafana-url
      - "{{ grafana_url }}"
      - --receiver
      - "{{ perfmon_alert_receiver_name | trim }}"
      - --group-wait
      - "{{ perfmon_alert_group_wait }}"
      - --group-interval
      - "{{ perfmon_alert_group_interval }}"
      - --repeat-interval
      - "{{ perfmon_alert_repeat_interval }}"
      - --group-by
      - "{{ perfmon_alert_group_by }}"
  environment:
    GRAFANA_API_KEY: "{{ grafana_api_key }}"
  when: perfmon_alert_contact_points | length > 0
  changed_when: false
  delegate_to: localhost
  no_log: true
