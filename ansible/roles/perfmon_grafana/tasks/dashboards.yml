---
# Import dashboard JSON files into Grafana via the community.grafana collection.

- name: Ensure PerformanceMonitor folder exists
  community.grafana.grafana_folder:
    grafana_url: "{{ grafana_url }}"
    grafana_api_key: "{{ grafana_api_key }}"
    title: "{{ grafana_folder }}"
    uid: "{{ grafana_folder_uid }}"
    state: present
  delegate_to: localhost
  no_log: true

- name: Import dashboard
  community.grafana.grafana_dashboard:
    grafana_url: "{{ grafana_url }}"
    grafana_api_key: "{{ grafana_api_key }}"
    path: "{{ item }}"
    folder: "{{ grafana_folder }}"
    overwrite: true
    state: present
  loop: >-
    {{ lookup('fileglob', role_path + '/files/grafana/dashboards/perfmon/*.json', wantlist=true)
       | reject('search', 'fleet-overview-v2\.json$') | list }}
  loop_control:
    label: "{{ item | basename | replace('.json', '') }}"
  delegate_to: localhost
  no_log: true

- name: Check for schema-v2 dynamic fleet file
  ansible.builtin.stat:
    path: "{{ role_path }}/files/grafana/dashboards/perfmon/fleet-overview-v2.json"
  delegate_to: localhost
  register: _perfmon_fleet_v2_file

- name: Probe Grafana version and feature toggles
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/frontend/settings"
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    return_content: true
  register: _perfmon_grafana_settings
  delegate_to: localhost
  no_log: true
  when: _perfmon_fleet_v2_file.stat.exists

- name: Look up org id for schema-v2 namespace
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/org"
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    return_content: true
  register: _perfmon_current_org
  delegate_to: localhost
  no_log: true
  when: _perfmon_fleet_v2_file.stat.exists

- name: Derive schema-v2 namespace path from org id
  ansible.builtin.set_fact:
    _perfmon_fleet_v2_ns_path: >-
      apis/dashboard.grafana.app/v2beta1/namespaces/{{
      'default' if _perfmon_current_org.json.id == 1 else 'org-' ~ _perfmon_current_org.json.id }}
  when: _perfmon_fleet_v2_file.stat.exists

- name: Import schema-v2 dynamic fleet dashboard
  ansible.builtin.uri:
    url: "{{ grafana_url }}/{{ _perfmon_fleet_v2_ns_path }}/dashboards/{{ _perfmon_fleet_v2_body.metadata.name }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ grafana_api_key }}"
    body_format: json
    body: >-
      {{ _perfmon_fleet_v2_body
         | combine({'metadata': {'annotations': {'grafana.app/folder': grafana_folder_uid}}}, recursive=true) }}
    status_code: [200, 201]
  vars:
    _perfmon_fleet_v2_body: >-
      {{ lookup('file', role_path + '/files/grafana/dashboards/perfmon/fleet-overview-v2.json') | from_json }}
  delegate_to: localhost
  no_log: true
  when:
    - _perfmon_fleet_v2_file.stat.exists
    - not perfmon_fleet_static | bool
    - _perfmon_grafana_settings.json.buildInfo.version | default('0') is version('12.4', '>=')
    - _perfmon_grafana_settings.json.featureToggles.dashboardNewLayouts | default(false)
