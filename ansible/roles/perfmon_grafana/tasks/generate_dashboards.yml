---
# Generate dashboard JSON files from the Python builder embedded in the role.

- name: Generate dashboard JSON files
  ansible.builtin.command:
    argv: >-
      {{
        ['python3', role_path + '/files/build-dashboards.py']
        + (['--fleet-instances', perfmon_instances | map(attribute='inventory_hostname') | join(',')]
           if perfmon_fleet_static | bool else [])
      }}
  delegate_to: localhost
  become: false
  changed_when: true # always reports changed
