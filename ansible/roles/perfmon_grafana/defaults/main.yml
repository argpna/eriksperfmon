---
grafana_url: "http://localhost:3000"

grafana_folder: PerformanceMonitor
grafana_folder_uid: perfmon

perfmon_ds_name_prefix: PerfMon
perfmon_ds_uid_prefix: perfmon-ds

# datasource auth mode: sql or windows. Set fleet-wide here or in group_vars or
# per-host in inventory for a mixed fleet. A host-level value wins for that
# instance's datasource.
perfmon_reader_auth_mode: sql

# Ignored when the resolved auth mode is "windows" - perfmon_reader_windows_upn
# is used instead.
perfmon_reader_login_name: grafana_reader

# AD credentials for the datasource when the resolved auth mode is "windows". The
# UPN form user@REALM is required by Grafana's kerberos username field.
# perfmon_reader_windows_upn: set in inventory group_vars or vault
# perfmon_reader_windows_password: set in inventory group_vars or vault

# path on the Grafana host to a Kerberos client config (krb5.conf) pointing at the
# domain's KDC. Only used when the resolved auth mode is windows.
grafana_krb5_conf_path: /etc/krb5.conf

# Auto-discovered from the sql_servers inventory group. override with an explicit list
perfmon_instances: "{{ groups['sql_servers'] | default([]) | map('extract', hostvars) | list }}"

# Set to true to regenerate the fleet baked in static mode
perfmon_fleet_static: false

# Delete PerfMon-managed datasources/mute timings that exist in Grafana but aren't
# in this run's inventory/config. Off by default: a run against a partial inventory
# would otherwise delete datasources for every other instance. Only set true for a
# run whose inventory is the complete, current fleet.
perfmon_prune_orphaned: false

perfmon_alert_cpu_pct: 90
perfmon_alert_blocking_s: 30
perfmon_alert_deadlock_count: 1
perfmon_alert_tempdb_pct: 80
perfmon_alert_disk_free_pct: 10
perfmon_alert_disk_free_gb: 5
perfmon_alert_query_duration_floor_min: 30
perfmon_alert_poison_wait_floor_ms: 500
perfmon_alert_long_running_job_multiplier: 3
perfmon_alert_failed_job_lookback_min: 60

# Expects perfmon- prefix
perfmon_alert_mute_timings: []

# List of contact point objects. All entries should share the same name so Grafana
# treats them as one receiver with multiple integrations.
perfmon_alert_contact_points: []

# Receiver the team=perfmon route targets. Matches the contact point name below so no
# extra config is needed once perfmon_alert_contact_points is set. The route is only
# provisioned when perfmon_alert_contact_points is non-empty - see alerting.yml.
perfmon_alert_receiver_name: perfmon-alerts

perfmon_alert_group_wait: 30s
perfmon_alert_group_interval: 5m
perfmon_alert_repeat_interval: 4h
perfmon_alert_group_by: "team,instance,alertname"
