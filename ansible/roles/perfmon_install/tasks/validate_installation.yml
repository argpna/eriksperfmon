---
# Run 98_validate_installation.sql and interpret its results.
# Imported with when: _validate_script | length > 0, so every task here inherits that guard.

# captured from the instance itself and not the control node so it's immune to clock skew
- name: Capture instance datetime before running validation
  ansible.builtin.command:
    argv: >-
      {{ _sqlcmd_conn_args + ['-d', 'master', '-x', '-b', '-h', '-1', '-W', '-Q',
         'SET NOCOUNT ON; SELECT CONVERT(varchar(33), SYSDATETIME(), 126);'] }}
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  register: _validate_clock
  changed_when: false

- name: Run installation validation script
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', 'master', '-x', '-b', '-i', _validate_script] }}"
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  register: _validate_result
  changed_when: true

- name: Query recent collector errors for a readable failure summary
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', perfmon_db, '-x', '-b', '-h', '-1', '-W', '-Q', _recent_errors_sql] }}"
  vars:
    _recent_errors_sql: >-
        SET NOCOUNT ON;
        SELECT collector_name + N': ' + error_message
        FROM config.collection_log
        WHERE collection_status = N'ERROR'
        AND   collection_time >= '{{ _validate_clock.stdout | trim | replace("'", "''") }}'
        ORDER BY collection_time DESC;
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  register: _validate_recent_errors
  changed_when: false

- name: Extract collector execution failures from the Step 2 debug run
  ansible.builtin.set_fact:
    _validate_collector_failures: >-
      {{ (_validate_result.stdout.split('Step 2: Testing all collectors')[1] | default(''))
         .split('Step 3: Validating data collection')[0]
         | regex_findall('.*FAILED:.*') | map('trim') | list }}

- name: Extract structural check failures from the validation output
  ansible.builtin.set_fact:
    _validate_structural_failures: >-
      {{ (_validate_result.stdout.split('Hung Job Monitor - Quick Validation')[1] | default(''))
         | regex_findall('.*FAIL:.*') | map('trim') | list }}

- name: Determine whether validation found any current-run problems
  ansible.builtin.set_fact:
    _validate_has_problems: >-
      {{ (_validate_collector_failures | length > 0)
         or (_validate_recent_errors.stdout_lines | select | list | length > 0)
         or (_validate_structural_failures | length > 0) }}

- name: Fail if installation validation reported current problems
  ansible.builtin.fail:
    msg: |
      98_validate_installation.sql reported problems in the current run.
      {% set recent_errors = _validate_recent_errors.stdout_lines | select | list %}
      {% if _validate_collector_failures | length > 0 %}

      Collector execution failures (Step 2, @debug = 1):
      {% for line in _validate_collector_failures %}
        - {{ line }}
      {% endfor %}
      {% endif %}
      {% if recent_errors | length > 0 %}

      Collector errors logged since validation started:
      {% for line in recent_errors %}
        - {{ line }}
      {% endfor %}
      {% endif %}
      {% if _validate_structural_failures | length > 0 %}

      Structural checks failed:
      {% for line in _validate_structural_failures %}
        - {{ line }}
      {% endfor %}
      {% endif %}

      Query config.collection_log on {{ inventory_hostname }} for full history and error detail.
  when:
    - _validate_has_problems | bool
    - not perfmon_skip_validation_failures

- name: Warn instead of failing when perfmon_skip_validation_failures is set
  ansible.builtin.debug:
    msg: >-
      98_validate_installation.sql reported problems in the current run, but
      perfmon_skip_validation_failures is true. Query config.collection_log
      on {{ inventory_hostname }} for detail.
  when:
    - _validate_has_problems | bool
    - perfmon_skip_validation_failures

- name: Warn about historical errors in collection_log
  ansible.builtin.debug:
    msg: >-
      98_validate_installation.sql found ERROR rows in config.collection_log
      from before this run. The current collector tests all passed, but
      review config.collection_log for any potential issues.
  when: _validate_result.stdout is search('ERRORS FOUND IN COLLECTION LOG')

- name: Warn about NULL values in required collection columns
  ansible.builtin.debug:
    msg: >-
      98_validate_installation.sql found NULL values in columns that should never be NULL.
      Query the affected collect.* tables on {{ inventory_hostname }} for detail, or
      re-run 98_validate_installation.sql directly to see the full breakdown.
  when: _validate_result.stdout is search('Tables with NULL in required columns:')
