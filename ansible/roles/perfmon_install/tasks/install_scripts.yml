---
# Run PerformanceMonitor install scripts 01-54 in order against the target instance.
# 00 (uninstall) and 97-99 (tests/troubleshooting) are skipped.
# Install scripts are idempotent. Corresponding tasks report "changed" on every run;
# that is expected.

# potential footgun: with run_once the task executes on the play's first host only,
# and if that host skips this whole file (already at target version) the fact is
# never set for hosts that do need it - a mixed fleet then fails on the loop.
# removing run_once from the two tasks below.
- name: Gather install script list
  ansible.builtin.find:
    paths: "{{ _perfmon_install_dir }}"
    patterns: "[0-9]*.sql"
    file_type: file
  register: _script_find
  delegate_to: localhost

- name: Sort and filter scripts
  ansible.builtin.set_fact:
    _install_scripts: >-
      {{
        _script_find.files
        | map(attribute='path')
        | sort
        | reject('search', '/00_')
        | reject('search', '/97_')
        | reject('search', '/98_')
        | reject('search', '/99_')
        | list
      }}
  delegate_to: localhost

- name: Determine installation type for history record
  ansible.builtin.set_fact:
    _install_type: >-
      {%- if _installed_version_clean | default('') | length == 0 -%}
        INSTALL
      {%- elif _upgrade_needed | default(false) | bool -%}
        UPGRADE
      {%- elif _installed_version_clean is version(_perfmon_version_clean, '==') -%}
        REINSTALL
      {%- else -%}
        UPGRADE
      {%- endif -%}
  delegate_to: localhost

- name: Run install scripts and record result
  block:
    - name: Run install scripts
      ansible.builtin.command:
        argv:
          - "{{ sqlcmd_bin }}"
          - -S
          - "{{ _mssql_server }}"
          - -d
          - master
          - -C
          - -b
          - -i
          - "{{ item }}"
      loop: "{{ _install_scripts }}"
      loop_control:
        label: "{{ item | basename }}"
      environment: "{{ _sqlcmd_auth_env }}"
      delegate_to: localhost
      changed_when: true
      no_log: true

    - name: Record installation in installation_history
      ansible.builtin.command:
        argv:
          - "{{ sqlcmd_bin }}"
          - -S
          - "{{ _mssql_server }}"
          - -d
          - "{{ perfmon_db }}"
          - -C
          - -b
          - -Q
          - >-
            INSERT INTO config.installation_history
                (installer_version, installer_info_version, sql_server_version,
                 sql_server_edition, installation_type, previous_version,
                 installation_status, files_executed, files_failed)
            VALUES
                (N'{{ _perfmon_version_clean }}', N'ansible',
                 @@VERSION, CONVERT(nvarchar(512), SERVERPROPERTY(N'Edition')),
                 N'{{ _install_type }}',
                 {{ ("N'" + _installed_version_clean + "'") if _installed_version_clean | default('') | length > 0 else 'NULL' }},
                 N'SUCCESS', {{ _install_scripts | length }}, 0);
      environment: "{{ _sqlcmd_auth_env }}"
      delegate_to: localhost
      changed_when: true
      no_log: true
      when: not (_upgrade_needed | default(false) | bool)

  rescue:
    - name: Extract failure detail from the failed task result
      ansible.builtin.set_fact:
        _install_failure_raw: >-
          {%- set res = ansible_failed_result -%}
          {%- set failed_items = res.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list -%}
          {%- if failed_items | length > 0 -%}
            {{ failed_items[0].item | basename }}: {{ failed_items[0].stderr | default(failed_items[0].msg | default('no error output')) }}
          {%- else -%}
            {{ res.stderr | default(res.msg | default('no error output')) }}
          {%- endif -%}
      delegate_to: localhost

    - name: Sanitize failure detail for embedding in the sqlcmd command line and T-SQL literal
      ansible.builtin.set_fact:
        _install_failure_note: >-
          {{ _install_failure_raw
             | trim
             | regex_replace('[^A-Za-z0-9 ._:/-]', ' ')
             | regex_replace('\s+', ' ')
             | truncate(1900, True, '...') }}
      delegate_to: localhost

    - name: Record failed install in installation_history
      ansible.builtin.command:
        argv:
          - "{{ sqlcmd_bin }}"
          - -S
          - "{{ _mssql_server }}"
          - -d
          - "{{ perfmon_db }}"
          - -C
          - -b
          - -Q
          - >-
            IF OBJECT_ID(N'config.installation_history') IS NOT NULL
            INSERT INTO config.installation_history
                (installer_version, installer_info_version, sql_server_version,
                 sql_server_edition, installation_type, previous_version,
                 installation_status, files_executed, files_failed, installation_notes)
            VALUES
                (N'{{ _perfmon_version_clean }}', N'ansible',
                 @@VERSION, CONVERT(nvarchar(512), SERVERPROPERTY(N'Edition')),
                 N'{{ _install_type }}',
                 {{ ("N'" + _installed_version_clean + "'") if _installed_version_clean | default('') | length > 0 else 'NULL' }},
                 N'FAILED', 0, 1, N'{{ _install_failure_note }}');
      environment: "{{ _sqlcmd_auth_env }}"
      delegate_to: localhost
      changed_when: true
      failed_when: false
      no_log: true

    - name: Fail after recording install failure
      ansible.builtin.fail:
        msg: >-
          Install/reinstall of PerformanceMonitor {{ _perfmon_version_clean }} failed.
          Recorded FAILED status in config.installation_history.
          Fix the error above and re-run.
