---
# Create the grafana_reader login and grant SELECT on collect/report/config schemas,
# plus VIEW SERVER STATE for alert queries that read live DMVs - sys.dm_exec_requests,
# sys.dm_os_ring_buffers etc and SQLAgentReaderRole for reading msdb job history.

- name: Create grafana_reader server login
  ansible.builtin.command: >
    {{ sqlcmd_bin }}
    -S {{ _mssql_server }}
    -U {{ mssql_sa_user }}
    -P "{{ mssql_sa_password }}"
    -d master
    -C -b
    -Q "IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'grafana_reader')
            CREATE LOGIN grafana_reader WITH PASSWORD = N'{{ mssql_reader_password }}', CHECK_POLICY = OFF;
        GRANT VIEW SERVER STATE TO grafana_reader;"
  delegate_to: localhost
  changed_when: true
  no_log: true

- name: Create grafana_reader database user and grant schema permissions
  ansible.builtin.command: >
    {{ sqlcmd_bin }}
    -S {{ _mssql_server }}
    -U {{ mssql_sa_user }}
    -P "{{ mssql_sa_password }}"
    -d {{ perfmon_db }}
    -C -b
    -Q "IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader')
            CREATE USER grafana_reader FOR LOGIN grafana_reader;
        GRANT SELECT ON SCHEMA::collect TO grafana_reader;
        GRANT SELECT ON SCHEMA::report  TO grafana_reader;
        GRANT SELECT ON SCHEMA::config  TO grafana_reader;"
  delegate_to: localhost
  changed_when: true
  no_log: true

- name: Grant grafana_reader SQLAgentReaderRole on msdb for collector job monitoring
  ansible.builtin.command: >
    {{ sqlcmd_bin }}
    -S {{ _mssql_server }}
    -U {{ mssql_sa_user }}
    -P "{{ mssql_sa_password }}"
    -d msdb
    -C -b
    -Q "IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader')
            CREATE USER grafana_reader FOR LOGIN grafana_reader;
        IF IS_ROLEMEMBER(N'SQLAgentReaderRole', N'grafana_reader') = 0
            EXEC sp_addrolemember N'SQLAgentReaderRole', N'grafana_reader';"
  delegate_to: localhost
  changed_when: true
  no_log: true
