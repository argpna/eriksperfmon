---
# Role-based reader access: every permission is granted to grafana_reader_role, the reader
# login/users are just members of the role.
#
# perfmon_reader_auth_mode: sql (default) uses a SQL login named perfmon_reader_login_name.
# perfmon_reader_auth_mode: windows uses an AD login/group (perfmon_reader_windows_principal) -
# CREATE LOGIN ... FROM WINDOWS requires the instance to already be domain-joined. Not automated
# by this role.

- name: Compute reader login name
  ansible.builtin.set_fact:
    _reader_login_name: "{{ perfmon_reader_windows_principal if perfmon_reader_auth_mode == 'windows' else perfmon_reader_login_name }}"

- name: Compute SQL-escaped variants of the reader login name and password
  ansible.builtin.set_fact:
    _reader_login_name_sql: "{{ _reader_login_name | replace(\"'\", \"''\") }}"
    _reader_login_name_ident: "{{ _reader_login_name | replace(']', ']]') }}"
    _reader_password_sql: "{{ perfmon_reader_password | replace(\"'\", \"''\") }}"
  no_log: true

- name: Create grafana_reader server login and server role
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', 'master', '-x', '-b', '-Q', _reader_server_sql] }}"
  vars:
    _reader_server_sql: >-
        IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'{{ _reader_login_name_sql }}')
        {% if perfmon_reader_auth_mode == 'windows' %}
            CREATE LOGIN [{{ _reader_login_name_ident }}] FROM WINDOWS;
        {% else %}
            CREATE LOGIN [{{ _reader_login_name_ident }}] WITH PASSWORD = N'{{ _reader_password_sql }}', CHECK_POLICY = OFF;
        {% endif %}
        IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'grafana_reader_role' AND type = 'R')
            CREATE SERVER ROLE grafana_reader_role;
        {% if perfmon_reader_grant_view_server_state %}
        GRANT VIEW SERVER STATE TO grafana_reader_role;
        {% else %}
        REVOKE VIEW SERVER STATE FROM grafana_reader_role;
        {% endif %}
        {% if perfmon_reader_grant_cross_db_metadata %}
        GRANT CONNECT ANY DATABASE TO grafana_reader_role;
        GRANT VIEW ANY DEFINITION TO grafana_reader_role;
        {% else %}
        REVOKE CONNECT ANY DATABASE FROM grafana_reader_role;
        REVOKE VIEW ANY DEFINITION FROM grafana_reader_role;
        {% endif %}
        IF IS_SRVROLEMEMBER(N'grafana_reader_role', N'{{ _reader_login_name_sql }}') = 0
            ALTER SERVER ROLE grafana_reader_role ADD MEMBER [{{ _reader_login_name_ident }}];
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'present'

- name: Create grafana_reader database user, database role, and schema permissions
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', perfmon_db, '-x', '-b', '-Q', _reader_db_sql] }}"
  vars:
    _reader_db_sql: >-
        IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'{{ _reader_login_name_sql }}')
            CREATE USER [{{ _reader_login_name_ident }}] FOR LOGIN [{{ _reader_login_name_ident }}];
        IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader_role' AND type = 'R')
            CREATE ROLE grafana_reader_role AUTHORIZATION dbo;
        GRANT SELECT ON SCHEMA::collect TO grafana_reader_role;
        GRANT SELECT ON SCHEMA::report  TO grafana_reader_role;
        GRANT SELECT ON SCHEMA::config  TO grafana_reader_role;
        IF IS_ROLEMEMBER(N'grafana_reader_role', N'{{ _reader_login_name_sql }}') = 0
            ALTER ROLE grafana_reader_role ADD MEMBER [{{ _reader_login_name_ident }}];
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'present'

- name: Manage grafana_reader SQLAgentReaderRole membership on msdb for collector job monitoring
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', 'msdb', '-x', '-b', '-Q', _reader_msdb_sql] }}"
  vars:
    _reader_msdb_sql: >-
        IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'{{ _reader_login_name_sql }}')
            CREATE USER [{{ _reader_login_name_ident }}] FOR LOGIN [{{ _reader_login_name_ident }}];
        {% if perfmon_reader_grant_msdb_access %}
        IF IS_ROLEMEMBER(N'SQLAgentReaderRole', N'{{ _reader_login_name_sql }}') = 0
            EXEC sp_addrolemember N'SQLAgentReaderRole', N'{{ _reader_login_name_sql }}';
        {% else %}
        IF IS_ROLEMEMBER(N'SQLAgentReaderRole', N'{{ _reader_login_name_sql }}') = 1
            EXEC sp_droprolemember N'SQLAgentReaderRole', N'{{ _reader_login_name_sql }}';
        {% endif %}
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'present'

- name: Drop grafana_reader server role membership and role
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', 'master', '-x', '-b', '-Q', _drop_server_role_sql] }}"
  vars:
    _drop_server_role_sql: >-
        IF EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'grafana_reader_role' AND type = 'R')
        BEGIN
            IF IS_SRVROLEMEMBER(N'grafana_reader_role', N'{{ _reader_login_name_sql }}') = 1
                ALTER SERVER ROLE grafana_reader_role DROP MEMBER [{{ _reader_login_name_ident }}];
            DROP SERVER ROLE grafana_reader_role;
        END
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'absent'

- name: Drop grafana_reader database role and user in PerformanceMonitor
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', perfmon_db, '-x', '-b', '-Q', _drop_db_role_sql] }}"
  vars:
    _drop_db_role_sql: >-
        IF EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader_role' AND type = 'R')
        BEGIN
            IF IS_ROLEMEMBER(N'grafana_reader_role', N'{{ _reader_login_name_sql }}') = 1
                ALTER ROLE grafana_reader_role DROP MEMBER [{{ _reader_login_name_ident }}];
            DROP ROLE grafana_reader_role;
        END
        IF EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'{{ _reader_login_name_sql }}')
            DROP USER [{{ _reader_login_name_ident }}];
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'absent'

- name: Drop grafana_reader user in msdb
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', 'msdb', '-x', '-b', '-Q', _drop_msdb_user_sql] }}"
  vars:
    _drop_msdb_user_sql: >-
        IF EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'{{ _reader_login_name_sql }}')
            DROP USER [{{ _reader_login_name_ident }}];
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'absent'

- name: Drop grafana_reader server login
  ansible.builtin.command:
    argv: "{{ _sqlcmd_conn_args + ['-d', 'master', '-x', '-b', '-Q', _drop_login_sql] }}"
  vars:
    _drop_login_sql: >-
        IF EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'{{ _reader_login_name_sql }}')
        BEGIN
            DECLARE @kill nvarchar(max) = N'';
            SELECT @kill += N'KILL ' + CONVERT(nvarchar(12), session_id) + N';'
            FROM sys.dm_exec_sessions
            WHERE login_name = N'{{ _reader_login_name_sql }}';
            IF @kill <> N'' EXEC sys.sp_executesql @kill;
            DROP LOGIN [{{ _reader_login_name_ident }}];
        END
  environment: "{{ _sqlcmd_auth_env }}"
  delegate_to: localhost
  register: _drop_grafana_reader_login
  retries: 5
  delay: 2
  until: _drop_grafana_reader_login.rc == 0
  changed_when: true
  no_log: true
  when: perfmon_state == 'absent'
