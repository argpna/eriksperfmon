---
# Role-based grafana_reader access: every permission is granted to grafana_reader_role
# the grafana_reader login/users are just members of the role.

- name: Create grafana_reader server login and server role
  ansible.builtin.command:
    argv:
      - "{{ sqlcmd_bin }}"
      - -S
      - "{{ _mssql_server }}"
      - -U
      - "{{ mssql_sa_user }}"
      - -P
      - "{{ mssql_sa_password }}"
      - -d
      - master
      - -C
      - -b
      - -Q
      - >-
        IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'grafana_reader')
            CREATE LOGIN grafana_reader WITH PASSWORD = N'{{ mssql_reader_password }}', CHECK_POLICY = OFF;
        IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'grafana_reader_role' AND type = 'R')
            CREATE SERVER ROLE grafana_reader_role;
        {% if perfmon_reader_grant_view_server_state %}
        GRANT VIEW SERVER STATE TO grafana_reader_role;
        {% else %}
        REVOKE VIEW SERVER STATE FROM grafana_reader_role;
        {% endif %}
        {% if perfmon_reader_grant_cross_db_metadata %}
        GRANT CONNECT ANY DATABASE TO grafana_reader_role;
        GRANT VIEW ANY DEFINITION TO grafana_reader_role;
        {% else %}
        REVOKE CONNECT ANY DATABASE FROM grafana_reader_role;
        REVOKE VIEW ANY DEFINITION FROM grafana_reader_role;
        {% endif %}
        IF IS_SRVROLEMEMBER(N'grafana_reader_role', N'grafana_reader') = 0
            ALTER SERVER ROLE grafana_reader_role ADD MEMBER grafana_reader;
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'present'

- name: Create grafana_reader database user, database role, and schema permissions
  ansible.builtin.command:
    argv:
      - "{{ sqlcmd_bin }}"
      - -S
      - "{{ _mssql_server }}"
      - -U
      - "{{ mssql_sa_user }}"
      - -P
      - "{{ mssql_sa_password }}"
      - -d
      - "{{ perfmon_db }}"
      - -C
      - -b
      - -Q
      - >-
        IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader')
            CREATE USER grafana_reader FOR LOGIN grafana_reader;
        IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader_role' AND type = 'R')
            CREATE ROLE grafana_reader_role AUTHORIZATION dbo;
        GRANT SELECT ON SCHEMA::collect TO grafana_reader_role;
        GRANT SELECT ON SCHEMA::report  TO grafana_reader_role;
        GRANT SELECT ON SCHEMA::config  TO grafana_reader_role;
        IF IS_ROLEMEMBER(N'grafana_reader_role', N'grafana_reader') = 0
            ALTER ROLE grafana_reader_role ADD MEMBER grafana_reader;
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'present'

- name: Manage grafana_reader SQLAgentReaderRole membership on msdb for collector job monitoring
  ansible.builtin.command:
    argv:
      - "{{ sqlcmd_bin }}"
      - -S
      - "{{ _mssql_server }}"
      - -U
      - "{{ mssql_sa_user }}"
      - -P
      - "{{ mssql_sa_password }}"
      - -d
      - msdb
      - -C
      - -b
      - -Q
      - >-
        IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader')
            CREATE USER grafana_reader FOR LOGIN grafana_reader;
        {% if perfmon_reader_grant_msdb_access %}
        IF IS_ROLEMEMBER(N'SQLAgentReaderRole', N'grafana_reader') = 0
            EXEC sp_addrolemember N'SQLAgentReaderRole', N'grafana_reader';
        {% else %}
        IF IS_ROLEMEMBER(N'SQLAgentReaderRole', N'grafana_reader') = 1
            EXEC sp_droprolemember N'SQLAgentReaderRole', N'grafana_reader';
        {% endif %}
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'present'

- name: Drop grafana_reader server role membership and role
  ansible.builtin.command:
    argv:
      - "{{ sqlcmd_bin }}"
      - -S
      - "{{ _mssql_server }}"
      - -U
      - "{{ mssql_sa_user }}"
      - -P
      - "{{ mssql_sa_password }}"
      - -d
      - master
      - -C
      - -b
      - -Q
      - >-
        IF EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'grafana_reader_role' AND type = 'R')
        BEGIN
            IF IS_SRVROLEMEMBER(N'grafana_reader_role', N'grafana_reader') = 1
                ALTER SERVER ROLE grafana_reader_role DROP MEMBER grafana_reader;
            DROP SERVER ROLE grafana_reader_role;
        END
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'absent'

- name: Drop grafana_reader database role and user in PerformanceMonitor
  ansible.builtin.command:
    argv:
      - "{{ sqlcmd_bin }}"
      - -S
      - "{{ _mssql_server }}"
      - -U
      - "{{ mssql_sa_user }}"
      - -P
      - "{{ mssql_sa_password }}"
      - -d
      - "{{ perfmon_db }}"
      - -C
      - -b
      - -Q
      - >-
        IF EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader_role' AND type = 'R')
        BEGIN
            IF IS_ROLEMEMBER(N'grafana_reader_role', N'grafana_reader') = 1
                ALTER ROLE grafana_reader_role DROP MEMBER grafana_reader;
            DROP ROLE grafana_reader_role;
        END
        IF EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader')
            DROP USER grafana_reader;
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'absent'

- name: Drop grafana_reader user in msdb
  ansible.builtin.command:
    argv:
      - "{{ sqlcmd_bin }}"
      - -S
      - "{{ _mssql_server }}"
      - -U
      - "{{ mssql_sa_user }}"
      - -P
      - "{{ mssql_sa_password }}"
      - -d
      - msdb
      - -C
      - -b
      - -Q
      - >-
        IF EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'grafana_reader')
            DROP USER grafana_reader;
  delegate_to: localhost
  changed_when: true
  no_log: true
  when: perfmon_state == 'absent'

- name: Drop grafana_reader server login
  ansible.builtin.command:
    argv:
      - "{{ sqlcmd_bin }}"
      - -S
      - "{{ _mssql_server }}"
      - -U
      - "{{ mssql_sa_user }}"
      - -P
      - "{{ mssql_sa_password }}"
      - -d
      - master
      - -C
      - -b
      - -Q
      - >-
        IF EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'grafana_reader')
        BEGIN
            DECLARE @kill nvarchar(max) = N'';
            SELECT @kill += N'KILL ' + CONVERT(nvarchar(12), session_id) + N';'
            FROM sys.dm_exec_sessions
            WHERE login_name = N'grafana_reader';
            IF @kill <> N'' EXEC sys.sp_executesql @kill;
            DROP LOGIN grafana_reader;
        END
  delegate_to: localhost
  register: _drop_grafana_reader_login
  retries: 5
  delay: 2
  until: _drop_grafana_reader_login.rc == 0
  changed_when: true
  no_log: true
  when: perfmon_state == 'absent'
