---
# Install community tools
# Pre-populate community/ in the repo root for air-gapped environments.

- name: Create community tools staging directory
  ansible.builtin.file:
    path: "{{ perfmon_tmp_dir }}/community"
    state: directory
    mode: "0755"
  delegate_to: localhost
  run_once: true

- name: Check for pre-seeded community tool files
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../community/{{ item.name }}.sql"
  loop: "{{ perfmon_community_tools }}"
  loop_control:
    label: "{{ item.name }}"
  register: _community_preseeded
  delegate_to: localhost
  run_once: true

- name: Copy pre-seeded community tools
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../community/{{ item.item.name }}.sql"
    dest: "{{ perfmon_tmp_dir }}/community/{{ item.item.name }}.sql"
    mode: "0644"
  loop: "{{ _community_preseeded.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.stat.exists
  delegate_to: localhost
  run_once: true

- name: Download community tools
  ansible.builtin.get_url:
    url: "{{ item.item.url }}"
    dest: "{{ perfmon_tmp_dir }}/community/{{ item.item.name }}.sql"
    mode: "0644"
  loop: "{{ _community_preseeded.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: not item.stat.exists
  delegate_to: localhost
  run_once: true
  register: _download
  retries: 4
  delay: 30
  until: _download is succeeded

- name: Install community tools into PerformanceMonitor database
  ansible.builtin.command: >
    {{ sqlcmd_bin }}
    -S {{ _mssql_server }}
    -U {{ mssql_sa_user }}
    -P "{{ mssql_sa_password }}"
    -d {{ perfmon_db }}
    -C -b
    -i "{{ perfmon_tmp_dir }}/community/{{ item.name }}.sql"
  loop: "{{ perfmon_community_tools }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  changed_when: true
