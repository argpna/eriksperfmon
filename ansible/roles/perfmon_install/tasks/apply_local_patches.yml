---
# Apply local SQL patches immediately after install scripts so they are in place
# before the SQL Agent job runs for the first time. Set perfmon_local_patches_dir
# in your inventory to the directory containing .sql patch files.

- name: Gather local patch files
  ansible.builtin.find:
    paths: "{{ perfmon_local_patches_dir }}"
    patterns: "*.sql"
    file_type: file
  register: _local_patch_find
  delegate_to: localhost
  run_once: true

- name: Apply local patches
  ansible.builtin.command: >
    {{ sqlcmd_bin }}
    -S {{ _mssql_server }}
    -U {{ mssql_sa_user }}
    -P "{{ mssql_sa_password }}"
    -d master
    -C -b
    -i "{{ item }}"
  loop: "{{ _local_patch_find.files | map(attribute='path') | sort | list }}"
  loop_control:
    label: "{{ item | basename }}"
  delegate_to: localhost
  changed_when: true
