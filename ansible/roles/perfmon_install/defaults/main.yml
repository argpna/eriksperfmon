---
perfmon_version: "v3.0.0"
perfmon_state: present
perfmon_force_reinstall: false

mssql_instance: "MSSQLSERVER"
perfmon_admin_sql_user: sa
# perfmon_admin_sql_password: set in inventory group_vars or vault
# perfmon_reader_password: set in inventory group_vars or vault

# admin connection auth mode: sql (default) or windows (kerberos - requires krb5 client
# tools and krb5.conf on the control node, ansible_host set to the instance FQDN matching
# its SPN, and the principal already granted sysadmin on the instance).
perfmon_admin_auth_mode: sql

# UPN for kinit when perfmon_admin_auth_mode is windows, e.g. sqladmin@LAB.INTERNAL
# perfmon_admin_windows_upn: set in inventory group_vars or vault
# perfmon_admin_windows_password: set in inventory group_vars or vault

# reader auth mode: sql (default, creates a SQL login) or windows (AD-based login via
# CREATE LOGIN ... FROM WINDOWS - requires the instance already domain-joined).
perfmon_reader_auth_mode: sql

# SQL login name created when perfmon_reader_auth_mode is sql; change if it collides with
# an existing principal. Ignored in windows mode - see perfmon_reader_windows_principal.
perfmon_reader_login_name: grafana_reader

# down-level AD principal or group, e.g. LAB\svc_grafana_reader or LAB\SQLReaders.
# required when perfmon_reader_auth_mode is windows.
# perfmon_reader_windows_principal: set in inventory group_vars or vault

perfmon_db: PerformanceMonitor

# VIEW SERVER STATE is required for DMV-backed alerts and dashboards.
perfmon_reader_grant_view_server_state: true

# CONNECT ANY DATABASE + VIEW ANY DEFINITION, granted together, for the FinOps compression
# scan's cross-database sys.tables/sys.indexes reads.
perfmon_reader_grant_cross_db_metadata: true

# grant grafana_reader membership in msdb's SQLAgentReaderRole, needed for the Running
# Jobs collector to read SQL Agent job/schedule metadata.
perfmon_reader_grant_msdb_access: true

# path to sqlcmd on the ansible control node
# common locations: /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd sqlcmd
sqlcmd_bin: sqlcmd

# staging directory on the control node for the downloaded release zip and community
# tool files. Shared across all hosts in a play (download/extract tasks run_once) -
# do not set per-host in host_vars.
perfmon_tmp_dir: /tmp/perfmon-install

# directory of local .sql patch files to apply immediately after install scripts.
# leave empty to skip.
perfmon_local_patches_dir: ""

# directory checked for pre-seeded air-gapped install files (release zip, community
# tool .sql files) before downloading anything.
perfmon_community_dir: "{{ playbook_dir }}/../../community"

perfmon_community_tools:
  - name: sp_WhoIsActive
    url: "https://raw.githubusercontent.com/amachanic/sp_whoisactive/refs/heads/master/sp_WhoIsActive.sql"
  - name: DarlingData
    url: "https://raw.githubusercontent.com/erikdarlingdata/DarlingData/main/Install-All/DarlingData.sql"
  - name: FirstResponderKit
    url: "https://raw.githubusercontent.com/BrentOzarULTD/SQL-Server-First-Responder-Kit/refs/heads/main/Install-All-Scripts.sql"
